title: Thomas Kingsepp
description: Freelance Cloud Developer & Project Manager in München — Cloud-Migration, DevOps-Automatisierung, Projektleitung
url: 'https://kingsepp.dev'
baseurl: ''
locale: de_DE

# Theme (wenn verwendet)
# theme: jekyll-theme-slate

# Repository Info
repository: 'Kingsepp/kingsepp.github.io'

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag

# Pagination
permalink: /:year/:month/:day/:title/
paginate_path: /posts/:num/
paginate: 5

# SEO & Social
author:
  name: Thomas Kingsepp
social:
  name: Thomas Kingsepp
  links:
    - https://github.com/kingsepp
    - https://www.linkedin.com/in/thomas-kingsepp

exclude: [tests, scripts, node_modules, playwright-report, test-results]

# Markdown
markdown: kramdown
highlighter: rouge

# Sass
sass:
  style: compressed
