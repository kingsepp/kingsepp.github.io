<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google AdSense site verification (Ads laufen auf blog.kingsepp.dev; -->
    <!-- Verifizierung erfolgt auf Domain-Ebene und deckt alle Subdomains ab) -->
    <meta name="google-adsense-account" content="ca-pub-6035652446006884" />
    <title>{% if page.title %}{{ page.title }} - {% endif %}kingsepp.dev</title>
    <meta
      name="description"
      content="{% if page.description %}{{ page.description }}{% else %}Cloud Developer & Project Manager – Cloud-native Systeme entwickeln, Workflows automatisieren, Projekte leiten{% endif %}"
    />
    {% if page.robots %}
    <meta name="robots" content="{{ page.robots }}" />
    {% endif %}

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}" />

    <link rel="stylesheet" href="{{ '/assets/css/terminal.css' | relative_url }}" />
    {% seo %}

    <!-- Cloudflare Turnstile Global Script -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body>
    {% include header.html %}

    <main>{{ content }}</main>

    <footer>
      <p>
        $ echo "kingsepp.dev" //
        <a href="{{ '/impressum' | relative_url }}">impressum</a> //
        <a href="{{ '/datenschutz' | relative_url }}">datenschutz</a>
      </p>
    </footer>

    <!-- Cookie Consent System -->
    {% include cookie-consent.html %}

    <!-- Conditional Google Analytics -->
    <script>
      // Load Google Analytics only if user accepted all cookies
      function loadAnalytics() {
        if (
          typeof readCookie === 'function' &&
          readCookie('cookie-notice-dismissed') === 'accept'
        ) {
          console.log('Loading Google Analytics after consent');

          // Load gtag script
          const script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-6P6F8KLCQS';
          document.head.appendChild(script);

          // Initialize gtag
          window.dataLayer = window.dataLayer || [];
          function gtag() {
            dataLayer.push(arguments);
          }
          gtag('js', new Date());
          gtag('config', 'G-6P6F8KLCQS', {
            anonymize_ip: true,
            allow_google_signals: false,
            allow_ad_personalization_signals: false,
          });
        } else {
          console.log(
            'Analytics not loaded - user consent:',
            readCookie('cookie-notice-dismissed')
          );
        }
      }

      // Load analytics after page load
      document.addEventListener('DOMContentLoaded', loadAnalytics);
    </script>

    <!-- Conditional Google AdSense -->
    <script>
      // Load Google AdSense ad script only if user accepted all cookies
      function loadAdSense() {
        if (
          typeof readCookie === 'function' &&
          readCookie('cookie-notice-dismissed') === 'accept'
        ) {
          console.log('Loading Google AdSense after consent');

          const script = document.createElement('script');
          script.async = true;
          script.src =
            'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6035652446006884';
          script.crossOrigin = 'anonymous';
          document.head.appendChild(script);
        } else {
          console.log('AdSense not loaded - user consent:', readCookie('cookie-notice-dismissed'));
        }
      }

      // Load AdSense after page load
      document.addEventListener('DOMContentLoaded', loadAdSense);
    </script>

    <!-- Main JavaScript with Turnstile callbacks -->
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>

    {% if page.typing_effect %}
    <script src="{{ '/assets/js/terminal.js' | relative_url }}"></script>
    {% endif %}
  </body>
</html>
